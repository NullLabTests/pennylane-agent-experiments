<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BFFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- Atom / orbit icon -->
  <g transform="translate(100,85)" stroke="url(#accent)" stroke-width="2.5" fill="none">
    <ellipse rx="35" ry="12" transform="rotate(0)" opacity="0.8"/>
    <ellipse rx="35" ry="12" transform="rotate(60)" opacity="0.8"/>
    <ellipse rx="35" ry="12" transform="rotate(120)" opacity="0.8"/>
    <circle r="6" fill="url(#accent)" stroke="none"/>
  </g>
  <!-- Graph nodes (ML/AI hint) -->
  <g transform="translate(100,85)">
    <circle cx="-18" cy="-10" r="3" fill="#00D4AA" opacity="0.7"/>
    <circle cx="18" cy="-10" r="3" fill="#00D4AA" opacity="0.7"/>
    <circle cx="0" cy="20" r="3" fill="#00D4AA" opacity="0.7"/>
    <line x1="-18" y1="-10" x2="0" y2="20" stroke="#00D4AA" stroke-width="1" opacity="0.4"/>
    <line x1="18" y1="-10" x2="0" y2="20" stroke="#00D4AA" stroke-width="1" opacity="0.4"/>
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#00D4AA" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="100" y="155" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="12" font-weight="bold" letter-spacing="1">
    AGENT
  </text>
  <text x="100" y="170" text-anchor="middle" fill="#00D4AA" font-family="Arial,sans-serif" font-size="8" letter-spacing="2">
    HYPOTHESES
  </text>
</svg>
