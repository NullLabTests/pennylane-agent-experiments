id: H5
title: "Data-Reuploading with Trainable Scaling Outperforms Fixed Encoding"
description: >
  Test L-layer data re-uploading with per-layer trainable scaling parameters
  against classical MLP baselines on the 'Better than classical?' benchmark suite.
device:
  backend: lightning.qubit
  wires: 1
  shots: null
hyperparams:
  layer_counts: [1, 2, 3, 5]
  n_epochs: 8
  learning_rate: 0.5
  n_samples: 200
  seed: 42
expected_runtime_sec: 90
resource_caps:
  max_qubits: 1
  max_gates: 100
  max_shots: null
